services:
  spotify-downloader:
    build: .
    image: spotify-downloader:latest
    container_name: spotify-downloader
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AUDIO_FORMAT: mp3
      LOG_LEVEL: INFO
    volumes:
      - ./downloads:/data/downloads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
