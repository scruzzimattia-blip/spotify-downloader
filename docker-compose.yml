services:
  spotify-downloader:
    build: .
    image: spotify-downloader:latest
    container_name: spotify-downloader
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AUDIO_FORMAT: mp3
      LOG_LEVEL: INFO
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      # soundcloud (Standard, kein YouTube) | soundcloud,youtube für Fallback
      AUDIO_SOURCES: ${AUDIO_SOURCES:-soundcloud}
    volumes:
      - ./downloads:/data/downloads
      # Optional: YouTube-Cookies für yt-dlp, falls Bot-Detection zuschlaegt.
      # cookies.txt via "Get cookies.txt LOCALLY" Browser-Extension exportieren.
      - ./cookies.txt:/etc/cookies.txt
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
