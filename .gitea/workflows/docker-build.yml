name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY || 'git.scruzzi.com' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image prefix and tag list
        id: prep
        env:
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          IMAGE_PREFIX="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=${IMAGE_PREFIX}" >> "${GITHUB_ENV}"
          VERSION="$(date -u +%Y%m%d)-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

          {
            echo "${REGISTRY}/${IMAGE_PREFIX}:${VERSION}"
            echo "${REGISTRY}/${IMAGE_PREFIX}:${{ github.sha }}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "${REGISTRY}/${IMAGE_PREFIX}:latest"
            fi
          } > /tmp/image-tags.txt

          echo "tags<<TAGS_EOF" >> "${GITHUB_OUTPUT}"
          cat /tmp/image-tags.txt >> "${GITHUB_OUTPUT}"
          echo "TAGS_EOF" >> "${GITHUB_OUTPUT}"

          echo "--- tags to push ---"
          cat /tmp/image-tags.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Gitea: PAT mit read:package + write:package als REGISTRY_TOKEN.
      # docker login --password-stdin ist auf manchen Runnern zuverlässiger
      # als docker/login-action. Ohne gültiges Secret: weiterhin "unauthorized".
      - name: Log in to container registry
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          set -euo pipefail
          USERNAME='${{ secrets.REGISTRY_USERNAME || github.actor }}'
          TOKEN="${REGISTRY_TOKEN:-}"
          if [ -z "${TOKEN}" ]; then
            TOKEN="${GITEA_TOKEN:-}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::No REGISTRY_TOKEN (or GITEA_TOKEN) secret — cannot log in. Create a PAT with read:package + write:package."
            exit 1
          fi
          echo "${TOKEN}" | docker login "${REGISTRY}" -u "${USERNAME}" --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}

      - name: Show pushed tags
        run: |
          echo "Pushed:"
          echo "${{ steps.prep.outputs.tags }}"
