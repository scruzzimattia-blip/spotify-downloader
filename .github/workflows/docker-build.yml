name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Repository variable REGISTRY: override e.g. for Docker Hub or self-hosted
  REGISTRY: ${{ vars.REGISTRY != '' && vars.REGISTRY || 'ghcr.io' }}

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image prefix and tag list
        id: prep
        env:
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          IMAGE_PREFIX="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=${IMAGE_PREFIX}" >> "${GITHUB_ENV}"
          VERSION="$(date -u +%Y%m%d)-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

          {
            echo "${REGISTRY}/${IMAGE_PREFIX}:${VERSION}"
            echo "${REGISTRY}/${IMAGE_PREFIX}:${{ github.sha }}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "${REGISTRY}/${IMAGE_PREFIX}:latest"
            fi
          } > /tmp/image-tags.txt

          echo "tags<<TAGS_EOF" >> "${GITHUB_OUTPUT}"
          cat /tmp/image-tags.txt >> "${GITHUB_OUTPUT}"
          echo "TAGS_EOF" >> "${GITHUB_OUTPUT}"

          echo "--- tags to push ---"
          cat /tmp/image-tags.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Log in to custom container registry
        if: env.REGISTRY != 'ghcr.io'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          USERNAME="${REGISTRY_USERNAME:-}"
          PASSWORD="${REGISTRY_PASSWORD:-}"
          if [ -z "${USERNAME}" ] || [ -z "${PASSWORD}" ]; then
            echo "::error::For a non-ghcr.io registry, set repository secrets REGISTRY_USERNAME and REGISTRY_PASSWORD."
            exit 1
          fi
          echo "${PASSWORD}" | docker login "${REGISTRY}" -u "${USERNAME}" --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}

      - name: Show pushed tags
        run: |
          echo "Pushed:"
          echo "${{ steps.prep.outputs.tags }}"
